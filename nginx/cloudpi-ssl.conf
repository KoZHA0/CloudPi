# ==============================================================
# CloudPi — Nginx Reverse Proxy Configuration (HTTPS + Tailscale)
# ==============================================================
# Use this config when Tailscale HTTPS certificates are set up.
#
# Prerequisites:
#   1. Tailscale installed and connected:  sudo tailscale up
#   2. HTTPS certs generated:  sudo tailscale cert <your-hostname>
#      Certs are saved to: /etc/ssl/certs/<hostname>.crt
#                          /etc/ssl/private/<hostname>.key
#
# Copy to: /etc/nginx/sites-available/cloudpi
# Enable:  sudo ln -s /etc/nginx/sites-available/cloudpi /etc/nginx/sites-enabled/
# Test:    sudo nginx -t
# Reload:  sudo systemctl reload nginx
# ==============================================================

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name YOUR_TAILSCALE_HOSTNAME;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name YOUR_TAILSCALE_HOSTNAME;

    # ── Tailscale TLS certificates ───────────────────────────
    # Replace YOUR_TAILSCALE_HOSTNAME with your actual hostname
    # e.g., raspberrypi.your-tailnet.ts.net
    ssl_certificate     /etc/ssl/certs/YOUR_TAILSCALE_HOSTNAME.crt;
    ssl_certificate_key /etc/ssl/private/YOUR_TAILSCALE_HOSTNAME.key;

    # ── TLS settings ────────────────────────────────────────
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Logging ──────────────────────────────────────────────
    access_log /var/log/nginx/cloudpi-access.log;
    error_log  /var/log/nginx/cloudpi-error.log;

    # ── File upload size (match Express/Multer limit) ────────
    client_max_body_size 100M;

    # ── Security headers ─────────────────────────────────────
    add_header X-Content-Type-Options  nosniff       always;
    add_header X-Frame-Options         DENY          always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Proxy all requests to Express (port 3001) ────────────
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # Pass real client info to Express
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if needed later)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts (generous for large file uploads on Pi)
        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }
}

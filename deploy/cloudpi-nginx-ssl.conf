# ==============================================================
# CloudPi — Nginx Production Config (HTTPS + Tailscale + Static Frontend)
# ==============================================================
# Use this config when Tailscale HTTPS certificates are set up.
#
# Prerequisites:
#   1. Tailscale installed and connected:  sudo tailscale up
#   2. HTTPS certs generated:  sudo tailscale cert <your-hostname>
#
# Install:
#   sudo cp cloudpi-nginx-ssl.conf /etc/nginx/sites-available/cloudpi
#   sudo ln -sf /etc/nginx/sites-available/cloudpi /etc/nginx/sites-enabled/cloudpi
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# NOTE: Replace YOUR_TAILSCALE_HOSTNAME with your actual hostname
#       e.g., raspberrypi.tail12345.ts.net
# ==============================================================

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name YOUR_TAILSCALE_HOSTNAME;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name YOUR_TAILSCALE_HOSTNAME;

    # ── Tailscale TLS certificates ───────────────────────────
    ssl_certificate     /etc/ssl/certs/YOUR_TAILSCALE_HOSTNAME.crt;
    ssl_certificate_key /etc/ssl/private/YOUR_TAILSCALE_HOSTNAME.key;

    # ── TLS settings ────────────────────────────────────────
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Logging ──────────────────────────────────────────────
    access_log /var/log/nginx/cloudpi-access.log;
    error_log  /var/log/nginx/cloudpi-error.log;

    # ── File upload size (match Express/Multer limit) ────────
    client_max_body_size 100M;

    # ── Security headers ─────────────────────────────────────
    add_header X-Content-Type-Options  nosniff       always;
    add_header X-Frame-Options         DENY          always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Enable gzip compression ──────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Serve frontend static files ──────────────────────────
    root /home/pi/cloudpi/frontend/dist;
    index index.html;

    # SPA fallback — all non-API, non-asset routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache static assets aggressively ─────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Server-Sent Events stream ────────────────────────────
    # Keep the drive-status stream unbuffered and do not send Upgrade headers.
    location = /api/events {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_buffering off;
        proxy_cache off;
        gzip off;

        proxy_connect_timeout 60s;
        proxy_send_timeout    1h;
        proxy_read_timeout    1h;
    }

    # ── Proxy API requests to Express backend ────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }

    # ── Proxy uploaded file requests ─────────────────────────
    location /uploads/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

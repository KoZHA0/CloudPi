# ==============================================================
# CloudPi — Docker Compose Production Stack
# ==============================================================
#
# Usage:
#   docker compose up -d              # Start everything
#   docker compose logs -f            # Follow all logs
#   docker compose logs -f backend    # Follow backend logs only
#   docker compose down               # Stop everything
#   docker compose up -d --build      # Rebuild and restart
#
# First time setup:
#   1. Copy backend/.env.example to backend/.env and configure
#   2. Run: docker compose up -d --build
#   3. Visit http://<pi-ip> to set up admin account
#
# ==============================================================

services:
  # ── Backend (Node.js + Express + SQLite) ───────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: cloudpi-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - PORT=3001
      - NODE_ENV=production
      - CLOUDPI_DB_PATH=/data/cloudpi.db
      # Host path where USB drives are auto-mounted (default: /media/pi)
      - CLOUDPI_EXTERNAL_DRIVES_PATH=/media/pi
      # ── LUKS Configuration ──────────────────────────────────────────────
      # LUKS_DEVICE: the raw LUKS-encrypted partition (e.g. /dev/sda1)
      # The backend calls `cryptsetup luksOpen` and `mount` on this device
      # via the host OS (via a privileged sudoers-wrapped helper or host scripts).
      # If you manage LUKS unlocking purely at host level before Docker starts,
      # only LUKS_MOUNT_POINT is strictly needed here.
      - LUKS_DEVICE=${LUKS_DEVICE:-/dev/sda1}
      - LUKS_MAPPER_NAME=${LUKS_MAPPER_NAME:-cloudpi-data}
      - LUKS_MOUNT_POINT=${LUKS_MOUNT_POINT:-/media/cloudpi-data}
    volumes:
      # Persist database (survives container rebuilds)
      - cloudpi-db:/data
      # Persist user uploads
      - cloudpi-uploads:/app/backend/uploads
      # Persist storage (internal file storage)
      - cloudpi-storage:/app/backend/storage
      # Access host CPU temperature (Raspberry Pi)
      - /sys/class/thermal:/sys/class/thermal:ro
      # USB drive access — host OS handles mounting via udisks2/usbmount
      # Read-write needed: backend stores user files on external drives
      # SECURITY: privileged mode and /dev access removed — not needed
      # rslave propagation: host→container only (one-way). The container sees
      # drives mounted on the host after startup, but cannot propagate mounts
      # back to the host. Narrowed to /media/pi to limit visibility.
      - /media/pi:/media/pi:rslave
      # ── LUKS / Cryptomator data volume ──────────────────────────────────
      # Once the admin unlocks the LUKS drive via the Web UI, the host mounts
      # the decrypted ext4/exfat partition here.  This bind mount lets the
      # backend (and WebDAV server) serve files from the encrypted drive.
      # rslave: same one-way propagation policy as /media/pi above.
      # NOTE: The directory must exist on the host before Docker starts;
      #       it is created automatically by luks.js on first unlock.
      - /media/cloudpi-data:/media/cloudpi-data:rslave
    networks:
      - cloudpi-net
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3001/api/test",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.80"

  # ── Nginx (Frontend + Reverse Proxy) ──────────────────────
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
      target: nginx
    container_name: cloudpi-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Mount the CloudPi nginx config
      - ./deploy/docker-nginx.conf:/etc/nginx/conf.d/cloudpi.conf:ro
      # Map the Tailscale certs (Host) to the CloudPi certs (Container)
      - /etc/ssl/certs/pi.taild54945.ts.net.crt:/etc/ssl/certs/cloudpi.crt:ro
      - /etc/ssl/private/pi.taild54945.ts.net.key:/etc/ssl/private/cloudpi.key:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - cloudpi-net

# ── Persistent Volumes ──────────────────────────────────────
# Docker manages these volumes. Data survives container rebuilds.
# View: docker volume ls | grep cloudpi
# Backup: docker run --rm -v cloudpi_cloudpi-uploads:/data -v $(pwd):/bak alpine tar czf /bak/uploads.tar.gz /data
volumes:
  cloudpi-db:
    driver: local
  cloudpi-uploads:
    driver: local
  cloudpi-storage:
    driver: local

# ── Network ─────────────────────────────────────────────────
networks:
  cloudpi-net:
    driver: bridge

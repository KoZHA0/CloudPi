# ==============================================================
# CloudPi — Nginx Production Config (Static Frontend + API Proxy)
# ==============================================================
# This replaces the old config that proxied everything to Express.
# Now Nginx serves the built frontend directly (much faster),
# and only proxies /api/ and /uploads/ to the backend.
#
# Install:
#   sudo cp cloudpi-nginx.conf /etc/nginx/sites-available/cloudpi
#   sudo ln -sf /etc/nginx/sites-available/cloudpi /etc/nginx/sites-enabled/cloudpi
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# NOTE: Adjust paths and server_name for your setup.
# ==============================================================

server {
    listen 80;
    server_name cloudpi.local;

    # ── Logging ──────────────────────────────────────────────
    access_log /var/log/nginx/cloudpi-access.log;
    error_log  /var/log/nginx/cloudpi-error.log;

    # ── File upload size (match Express/Multer limit) ────────
    client_max_body_size 100M;

    # ── Security headers ─────────────────────────────────────
    add_header X-Content-Type-Options  nosniff       always;
    add_header X-Frame-Options         DENY          always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── Enable gzip compression ──────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Serve frontend static files ──────────────────────────
    root /home/pi/cloudpi/frontend/dist;
    index index.html;

    # SPA fallback — all non-API, non-asset routes serve index.html
    # This allows React Router to handle client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache static assets aggressively ─────────────────────
    # Vite adds content hashes to filenames, so long caching is safe
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Server-Sent Events stream ────────────────────────────
    # Keep the drive-status stream unbuffered and do not send Upgrade headers.
    location = /api/events {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_buffering off;
        proxy_cache off;
        gzip off;

        proxy_connect_timeout 60s;
        proxy_send_timeout    1h;
        proxy_read_timeout    1h;
    }

    # ── Proxy API requests to Express backend ────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # Pass real client info to Express
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts (generous for large file uploads on Pi)
        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }

    # ── Proxy uploaded file requests ─────────────────────────
    location /uploads/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

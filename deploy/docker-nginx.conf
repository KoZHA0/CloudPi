# ==============================================================
# CloudPi — Nginx Config for Docker Compose
# ==============================================================
# This config is mounted into the nginx container.
# It serves the built frontend and proxies API to the backend container.
#
# Key difference from bare-metal: uses Docker DNS name "backend"
# instead of localhost:3001
# ==============================================================

# ── Upstream backend ─────────────────────────────────────────
upstream cloudpi_backend {
    server backend:3001;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name pi.taild54945.ts.net;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name pi.taild54945.ts.net;

    # ── Tailscale TLS certificates ───────────────────────────
    ssl_certificate     /etc/ssl/certs/cloudpi.crt;
    ssl_certificate_key /etc/ssl/private/cloudpi.key;

    # ── TLS settings ────────────────────────────────────────
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── File upload size ─────────────────────────────────────
    # 10 GB to accommodate large Cryptomator vault transfers via WebDAV
    client_max_body_size 10G;

    # ── Security headers ─────────────────────────────────────
    add_header X-Content-Type-Options  nosniff       always;
    add_header X-Frame-Options         DENY          always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── Gzip compression ─────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Serve frontend static files ──────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache Vite hashed assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Proxy API to backend container ───────────────────────
    location /api/ {
        proxy_pass         http://cloudpi_backend;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts for large uploads
        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }

    # ── Proxy uploaded files ─────────────────────────────────
    location /uploads/ {
        proxy_pass         http://cloudpi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # -- WebDAV proxy (Cryptomator) ------------------------------------------
    # Cryptomator connects here to create and sync encrypted vaults.
    # WebDAV requires PROPFIND, MKCOL, COPY, MOVE, LOCK, etc. plus its own
    # headers (Destination, Overwrite, Depth) forwarded intact.
    location /webdav/ {
        proxy_pass         http://cloudpi_backend;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Forward WebDAV-specific headers
        proxy_set_header Destination   $http_destination;
        proxy_set_header Overwrite     $http_overwrite;
        proxy_set_header Depth         $http_depth;

        # Large timeouts: vault sync can transfer gigabytes
        proxy_connect_timeout  60s;
        proxy_send_timeout    600s;
        proxy_read_timeout    600s;

        # Disable buffering for streaming uploads / PROPFIND responses
        proxy_request_buffering off;
        proxy_buffering         off;
    }
}

# ==============================================================
# CloudPi — Nginx Reverse Proxy Configuration (HTTP)
# ==============================================================
# Copy to: /etc/nginx/sites-available/cloudpi
# Enable:  sudo ln -s /etc/nginx/sites-available/cloudpi /etc/nginx/sites-enabled/
# Test:    sudo nginx -t
# Reload:  sudo systemctl reload nginx
# ==============================================================

server {
    listen 80;
    server_name cloudpi.local;

    # ── Logging ──────────────────────────────────────────────
    access_log /var/log/nginx/cloudpi-access.log;
    error_log  /var/log/nginx/cloudpi-error.log;

    # ── File upload size (match Express/Multer limit) ────────
    client_max_body_size 100M;

    # ── Security headers ─────────────────────────────────────
    add_header X-Content-Type-Options  nosniff       always;
    add_header X-Frame-Options         DENY          always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── Proxy all requests to Express (port 3001) ────────────
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # Pass real client info to Express
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if needed later)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts (generous for large file uploads on Pi)
        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }
}
